<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<style>
			body {
				margin: 0;
				height: 100vh;
				background-image: url("errors/404-eva.gif");
				background-size: 1200px 900px;
				background-position: center calc(50% + 100px);
				background-repeat: no-repeat;
				background-color: white;
				position: relative;
			}
			p {
				position: absolute;
				left: 50%;
				transform: translateX(-50%);
				color: black;
				font-family: sans-serif;
				font-size: 8rem;
			}
			p:first-of-type {
				top: -120px;
				font-size: 8rem;
			}
			p:last-of-type {
				top: 90px;
				font-size: 3rem;
			}
			a {
				position: absolute;
				top: 200px;
				left: 50%;
				transform: translateX(-50%);
				color: white;
				font-family: sans-serif;
				font-size: 1.2rem;
				background: rgba(0, 0, 0, 0.5);
				padding: 10px 20px;
				border-radius: 8px;
				text-decoration: none;
			}
			a:hover {
				background: rgba(0, 0, 0, 0.75);
			}
		</style>
	</head>
	<body>
		<p>404</p>
		<p>Not Found</p>
		<a href="/">Click here to return home ♡</a>
	</body>
</html>
