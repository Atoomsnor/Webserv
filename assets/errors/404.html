<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<style>
			body {
				margin: 0;
				height: 100vh;
			}
			.error-bg {
				display: block;
				height: 100vh;
				background-image: url("errors/404-eva.gif");
				background-size: cover;
				background-position: center;
				background-repeat: no-repeat;
				position: relative;
			}
			.error-bg a.return-msg {
				position: absolute;
				top: 30px;
				left: 50%;
				transform: translateX(-50%);
				color: white;
				font-family: sans-serif;
				font-size: 1.2rem;
				background: rgba(0, 0, 0, 0.5);
				padding: 10px 20px;
				border-radius: 8px;
				text-decoration: none;
				cursor: pointer;
			}
			.error-bg a.return-msg:hover {
				background: rgba(0, 0, 0, 0.75);
			}
		</style>
	</head>
	<body>
		<div class="error-bg">
			<a href="/" class="return-msg">← Click here to return home</a>
		</div>
	</body>
</html>
