server {
	listen 127.0.0.1:8080;
	client_max_body_size 10000;

	error_page 404 /assets/errors/404.html;
	error_page 405 /assets/errors/405.html;

	location / {
		methods GET HEAD;
		root /assets;
		index helloWorld.html;
		autoindex off;
	}

	location /var {
		methods GET;
		root /assets;
		autoindex on;
	}

	location /var2 {
		methods GET;
		root /assets;
		autoindex off;
	}

	location /upload {
		methods POST DELETE;
		upload_store /upload;
	}

	location /old-page {
		return 301 /new-page;
	}

	location /cgi-bin {
		methods GET POST;
		root /var/www/cgi;
		cgi .php /usr/bin/php-cgi;
		cgi .py /usr/bin/python3;
		cgi .sh /usr/bin/sh;
	}
}

server {
	listen 0.0.0.0:9090;
	client_max_body_size 5000;

	error_page 404 /errors/404.html;

	location / {
		methods GET POST DELETE;
		index index.html;
		autoindex off;
	}

	location /api {
		methods GET POST DELETE;
		root /var/www/api;
		autoindex off;
		cgi .py /usr/bin/python3;
	}

	location /files {
		methods GET;
		root /var/www/files;
		autoindex on;
	}

	location /incoming {
		methods POST;
		upload_store /tmp/incoming;
	}
}