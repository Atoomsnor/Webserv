server {
	listen 8080;
	host 127.0.0.1;
	server_name test;
	error_page 404 /errors/404.html;
	client_max_body_size 1024;

	location / {
		root /var/www/html;
		index index.html;
		methods GET POST;
		autoindex off;
	}

	location /upload {
		root /var/www/uploads;
		methods POST DELETE;
		client_max_body_size 50M;
	}

	location /cgi-bin {
		root /var/www/cgi;
		cgi_extension .py .php;
		methods GET POST;
	}

	location /old {
		redirect 301 /new;
	}
}